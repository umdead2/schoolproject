<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vasaras darba piedāvājumi studentiem</title>
    <link rel="stylesheet" href="main.css">
</head>
<body> 
    <header>
        <div class="header-content">
            <h1 id="page-title">Vasaras darbi</h1>
            <div class="header-actions">
                <a href="javascript:void(0)" id="add_ad" class="btn-primary" onclick="openAddForm()">
                    <span>+</span> Pievienot sludinājumu
                </a>
            </div>
        </div>
    </header>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2>Pievienot jaunu vakanci</h2>
                    <p class="modal-subtitle">Aizpildiet informāciju, lai publicētu sludinājumu.</p>
                </div>
                <button class="close-btn" onclick="closeAddForm()">&times;</button>
            </div>
 
            <form id="add-job-form">
                <div class="form-group">
                    <label>Uzņēmuma nosaukums</label>
                    <input type="text" id="company-name" placeholder="Piemēram: ABC Solutions" maxlength="100" required>
                    <span class="char-count">0/100</span>
                </div>
 
                <div class="form-group">
                    <label>Vakances nosaukums</label>
                    <input type="text" id="job-title" placeholder="Piemēram: Pārdevēja palīgs" maxlength="60" required>
                    <span class="char-count">0/60</span>
                </div>
 
                <div class="form-row">
                    <div class="form-group">
                        <label for="job-city">Pilsēta</label>
                        <input type="text" id="job-city" list="city-list" placeholder="Sāciet rakstīt (piem. Rīga...)" required>
                        <datalist id="city-list">
                           
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label>Kategorija</label>
                        <select id="job-category" required>
                            <option value="">Izvēlieties</option>
                            <option value="Apkalpošana">Apkalpošana (Viesmīļi, bārmeņi)</option>
                            <option value="Tirdzniecība">Tirdzniecība (Pārdevēji, kases)</option>
                            <option value="Loģistika">Loģistika & Noliktava</option>
                            <option value="Ražošana">Ražošana & Pakošana</option>
                            <option value="Lauksaimniecība">Lauksaimniecība (Ogas, dārzi)</option>
                            <option value="Pasākumi">Pasākumi & Festivāli</option>
                            <option value="Administrācija">Administrācija & Birojs</option>
                            <option value="Kurjeri">Kurjeri & Piegāde</option>
                            <option value="Cits">Cits</option>
                        </select>
                    </div>
                </div>
 
                <div class="form-row">
                    <div class="form-group">
                        <label>Sāk darbu</label>
                        <div class="time-picker-group">
                            <input type="number" id="start-hour" class="time-input" min="0" max="23" placeholder="09" required>
                            <span class="time-separator">:</span>
                            <input type="number" id="start-min" class="time-input" min="0" max="59" placeholder="00" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Beidz darbu</label>
                        <div class="time-picker-group">
                            <input type="number" id="end-hour" class="time-input" min="0" max="23" placeholder="17" required>
                            <span class="time-separator">:</span>
                            <input type="number" id="end-min" class="time-input" min="0" max="59" placeholder="00" required>
                        </div>
                    </div>
                </div>
 
                <div class="form-row">
                    <div class="form-group">
                        <label>Strādās no</label>
                        <input type="date" id="date-from" required>
                    </div>
                    <div class="form-group">
                        <label>Strādās līdz</label>
                        <input type="date" id="date-to" required>
                    </div>
                </div>
 
                <div class="form-row">
                    <div class="form-group">
                        <label>Mēneša alga (€)</label>
                        <div class="salary-container">
                            <input type="number" id="salary-min" class="salary-input" placeholder="900" min="0" required>
                            <span class="salary-dash">—</span>
                            <input type="number" id="salary-max" class="salary-input" placeholder="1200" min="0" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Brīvas vietas</label>
                        <input type="number" id="open-slots" placeholder="1" min="1" value="1" required>
                    </div>
                </div>
 
                <div class="form-group">
                    <label>Galvenie pienākumi</label>
                    <textarea id="job-responsibilities" placeholder="Aprakstiet darbus..." maxlength="300" required></textarea>
                    <span class="char-count">0/300</span>
                </div>
 
                <div class="form-group">
                    <label>Prasības</label>
                    <textarea id="job-requirements" placeholder="Ko sagaidāt no darbinieka?" maxlength="300"></textarea>
                    <span class="char-count">0/300</span>
                </div>
 
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeAddForm()">Atcelt</button>
                    <button type="submit" class="save-btn">Publicēt</button>
                </div>
            </form>
        </div>
    </div>
<div id="add-filter" class="filters-container">
    <div class="filters-content">
        <!-- Search by Keyword -->
        <div class="filter-group">
            <label>Kompānija</label>
            <input type="text" id="filter-company" placeholder="Kompānija">
        </div>

        <!-- Filter by City -->
        <div class="filter-group">
            <label>Pilsēta</label>
            <input type="text" id="filter-city" list="city-list" placeholder="Visas pilsētas">
        </div>

        <!-- Filter by Category -->
        <div class="filter-group">
            <label>Kategorija</label>
            <select id="filter-category">
                <option value="all">Visas kategorijas</option>
                <option value="Apkalpošana">Apkalpošana (Viesmīļi, bārmeņi)</option>
                <option value="Tirdzniecība">Tirdzniecība (Pārdevēji, kases)</option>
                <option value="Loģistika">Loģistika & Noliktava</option>
                <option value="Ražošana">Ražošana & Pakošana</option>
                <option value="Lauksaimniecība">Lauksaimniecība (Ogas, dārzi)</option>
                <option value="Pasākumi">Pasākumi & Festivāli</option>
                <option value="Administrācija">Administrācija & Birojs</option>
                <option value="Kurjeri">Kurjeri & Piegāde</option>
                <option value="Cits">Cits</option>
            </select>
        </div>

        <!-- Filter by Salary -->
        <div class="filter-group">
                <label>Min. alga (€)</label>
                <input type="number" id="filter-salary" placeholder="Piem. 800">
            </div>

            <!-- Filter Button -->
            <div class="filter-actions">
                <button id="btn-filter" type="submit" class="filter-submit-btn">Meklēt</button>
            </div>
        </div>
</div>
    <main class="container">
        <div class="jobs-grid"></div>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
